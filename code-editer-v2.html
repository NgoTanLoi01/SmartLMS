<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeForge — Online Code Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #08080c;
      --bg-secondary: #0e0e14;
      --bg-tertiary: #16161e;
      --surface: rgba(18,18,26,0.82);
      --border: rgba(255,255,255,0.06);
      --border-active: rgba(0,230,138,0.35);
      --text-primary: #f0f0f2;
      --text-secondary: #a0a0ae;
      --text-muted: #55555f;
      --accent: #00e68a;
      --accent-dim: rgba(0,230,138,0.12);
      --accent-hover: #00cc7a;
      --gradient: linear-gradient(135deg,#00e68a,#a3e635);
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #38bdf8;
      --radius-sm:6px;--radius-md:10px;--radius-lg:16px;
      --shadow:0 4px 32px rgba(0,0,0,0.5);
      --transition:0.22s cubic-bezier(.4,0,.2,1);
      --navbar-h:54px;
      --statusbar-h:30px;
      --tab-h:42px;
    }
    [data-theme="light"] {
      --bg-primary:#f4f4f8;--bg-secondary:#ffffff;--bg-tertiary:#eaeaf0;
      --surface:rgba(255,255,255,0.85);
      --border:rgba(0,0,0,0.08);--border-active:rgba(0,180,110,0.35);
      --text-primary:#0a0a0f;--text-secondary:#55555f;--text-muted:#9999a6;
      --accent:#00b86e;--accent-dim:rgba(0,184,110,0.1);--accent-hover:#009e5e;
      --gradient:linear-gradient(135deg,#00b86e,#84cc16);
      --shadow:0 4px 32px rgba(0,0,0,0.07);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Space Grotesk',system-ui,sans-serif;
      background:var(--bg-primary);color:var(--text-primary);
      transition:background var(--transition),color var(--transition);
    }
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}

    /* ---- Loading Screen ---- */
    #loading-screen{
      position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:var(--bg-primary);transition:opacity .5s,visibility .5s;
    }
    #loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .loader-brackets{
      font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:700;
      color:var(--accent);letter-spacing:4px;
      animation:bracketPulse 1.6s ease-in-out infinite;
    }
    .loader-name{
      margin-top:16px;font-size:1.1rem;font-weight:600;letter-spacing:6px;
      text-transform:uppercase;color:var(--text-secondary);
      animation:fadeInUp .8s .3s both;
    }
    .loader-bar{
      margin-top:28px;width:180px;height:3px;border-radius:3px;
      background:var(--bg-tertiary);overflow:hidden;
    }
    .loader-bar-inner{
      height:100%;border-radius:3px;background:var(--gradient);
      animation:loadBar 2s ease-in-out forwards;
    }
    @keyframes bracketPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes loadBar{from{width:0}to{width:100%}}

    /* ---- Navbar ---- */
    #navbar{
      height:var(--navbar-h);display:flex;align-items:center;
      padding:0 16px;gap:8px;
      background:var(--surface);backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);z-index:100;position:relative;
    }
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-brand-icon{
      width:30px;height:30px;border-radius:var(--radius-sm);
      background:var(--gradient);display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:.85rem;color:#000;
    }
    .nav-brand-text{font-weight:700;font-size:1rem;color:var(--text-primary);letter-spacing:1px}
    .nav-sep{width:1px;height:24px;background:var(--border);margin:0 6px}
    .device-group{display:flex;gap:2px;background:var(--bg-tertiary);border-radius:var(--radius-sm);padding:2px}
    .device-btn{
      border:none;background:transparent;color:var(--text-muted);
      padding:5px 12px;border-radius:4px;font-size:.8rem;cursor:pointer;
      transition:all var(--transition);display:flex;align-items:center;gap:5px;
      font-family:inherit;
    }
    .device-btn:hover{color:var(--text-secondary)}
    .device-btn.active{background:var(--accent);color:#000;font-weight:600}
    .size-display{
      font-family:'JetBrains Mono',monospace;font-size:.72rem;
      color:var(--text-muted);min-width:72px;text-align:center;
    }
    .nav-actions{display:flex;gap:4px;margin-left:auto;align-items:center}
    .act-btn{
      border:none;background:transparent;color:var(--text-secondary);
      width:34px;height:34px;border-radius:var(--radius-sm);cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:1.05rem;
      transition:all var(--transition);position:relative;
    }
    .act-btn:hover{background:var(--accent-dim);color:var(--accent)}
    .act-btn[data-tooltip]:hover::after{
      content:attr(data-tooltip);position:absolute;top:calc(100% + 6px);left:50%;
      transform:translateX(-50%);padding:4px 10px;border-radius:4px;font-size:.7rem;
      white-space:nowrap;background:var(--bg-tertiary);color:var(--text-primary);
      border:1px solid var(--border);pointer-events:none;z-index:50;
      font-family:'Space Grotesk',sans-serif;
    }
    .act-btn.run-btn{
      background:var(--accent);color:#000;font-weight:600;width:auto;
      padding:0 14px;gap:6px;font-size:.82rem;
    }
    .act-btn.run-btn:hover{background:var(--accent-hover);color:#000;transform:scale(1.03)}
    .theme-toggle-icon{transition:transform .4s ease}
    [data-theme="dark"] .theme-toggle-icon{transform:rotate(0deg)}
    [data-theme="light"] .theme-toggle-icon{transform:rotate(180deg)}

    /* ---- Main Layout ---- */
    #main-content{
      display:flex;height:calc(100vh - var(--navbar-h) - var(--statusbar-h));
      position:relative;
    }
    #editor-panel{
      display:flex;flex-direction:column;min-width:260px;
      flex:0 0 50%;max-width:82%;background:var(--bg-secondary);
      border-right:1px solid var(--border);transition:flex-basis .05s;
    }
    #divider{
      width:5px;cursor:col-resize;background:var(--border);position:relative;
      flex-shrink:0;z-index:10;transition:background var(--transition);
    }
    #divider:hover,#divider.dragging{background:var(--accent);box-shadow:0 0 12px var(--accent-dim)}
    #divider::after{
      content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:3px;height:32px;border-radius:3px;background:var(--text-muted);opacity:.3;
      transition:opacity var(--transition);
    }
    #divider:hover::after,#divider.dragging::after{opacity:0}
    #preview-panel{
      flex:1;min-width:260px;display:flex;flex-direction:column;
      background:var(--bg-primary);position:relative;overflow:hidden;
    }

    /* ---- Editor Tabs ---- */
    .editor-tabs{
      height:var(--tab-h);display:flex;align-items:stretch;
      background:var(--bg-tertiary);border-bottom:1px solid var(--border);
      padding:0 8px;gap:2px;flex-shrink:0;
    }
    .editor-tab{
      display:flex;align-items:center;gap:6px;padding:0 16px;
      font-size:.82rem;font-weight:500;color:var(--text-muted);cursor:pointer;
      border-bottom:2px solid transparent;transition:all var(--transition);
      font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;
    }
    .editor-tab:hover{color:var(--text-secondary);background:var(--accent-dim)}
    .editor-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-dim)}
    .editor-tab i{font-size:.9rem}
    .tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .tab-dot.html-dot{background:#e44d26}
    .tab-dot.css-dot{background:#2965f1}

    /* ---- Editor Containers ---- */
    .editor-wrap{flex:1;position:relative;display:none}
    .editor-wrap.active{display:block}
    .editor-wrap .monaco-placeholder{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      color:var(--text-muted);font-size:.9rem;
    }

    /* ---- Preview ---- */
    .preview-header{
      height:var(--tab-h);display:flex;align-items:center;
      padding:0 12px;gap:8px;background:var(--bg-tertiary);
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .preview-header-title{font-size:.82rem;font-weight:600;color:var(--text-secondary)}
    .preview-header-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:dotBlink 2s infinite}
    @keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.4}}
    .preview-body{flex:1;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:0;position:relative}

    .device-frame{
      transition:width .45s cubic-bezier(.4,0,.2,1),border-radius .35s,box-shadow .35s;
      background:#fff;position:relative;overflow:hidden;
      box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 8px 40px rgba(0,0,0,0.35);
    }
    .device-frame.desktop{width:100%;height:100%;border-radius:0}
    .device-frame.tablet{width:768px;min-height:500px;border-radius:12px;margin:20px auto}
    .device-frame.mobile{width:375px;min-height:550px;border-radius:24px;margin:20px auto}

    .device-frame.tablet::before,.device-frame.mobile::before{
      content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
      background:#1a1a24;border-radius:0 0 10px 10px;z-index:2;
    }
    .device-frame.tablet::before{width:40px;height:6px}
    .device-frame.mobile::before{width:80px;height:16px;border-radius:0 0 14px 14px}

    #preview-iframe{width:100%;height:100%;border:none;background:#fff;display:block}

    /* ---- Status Bar ---- */
    #status-bar{
      height:var(--statusbar-h);display:flex;align-items:center;
      padding:0 14px;background:var(--bg-tertiary);
      border-top:1px solid var(--border);font-size:.72rem;color:var(--text-muted);
      gap:16px;flex-shrink:0;
    }
    .status-item{display:flex;align-items:center;gap:5px}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
    .status-right{margin-left:auto;display:flex;gap:16px}
    .status-shortcut{
      padding:1px 6px;border-radius:3px;background:var(--bg-secondary);
      border:1px solid var(--border);font-family:'JetBrains Mono',monospace;
      font-size:.65rem;
    }

    /* ---- Toast ---- */
    #toast-container{
      position:fixed;bottom:48px;right:20px;z-index:9000;
      display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none;
    }
    .toast-msg{
      padding:10px 18px;border-radius:var(--radius-md);
      background:var(--surface);backdrop-filter:blur(16px);
      border:1px solid var(--border);color:var(--text-primary);
      font-size:.84rem;display:flex;align-items:center;gap:8px;
      box-shadow:var(--shadow);pointer-events:auto;
      animation:toastIn .35s ease both;min-width:200px;
    }
    .toast-msg.removing{animation:toastOut .3s ease both}
    .toast-msg .toast-icon{font-size:1.1rem}
    .toast-msg.success .toast-icon{color:var(--accent)}
    .toast-msg.error .toast-icon{color:var(--danger)}
    .toast-msg.info .toast-icon{color:var(--info)}
    .toast-msg.warning .toast-icon{color:var(--warning)}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(40px)}}

    /* ---- Fullscreen Preview ---- */
    .fullscreen-overlay{
      position:fixed;inset:0;z-index:8000;background:var(--bg-primary);
      display:none;flex-direction:column;
    }
    .fullscreen-overlay.active{display:flex}
    .fullscreen-bar{
      height:44px;display:flex;align-items:center;padding:0 16px;
      background:var(--bg-tertiary);border-bottom:1px solid var(--border);gap:12px;
    }
    .fullscreen-bar span{font-size:.85rem;font-weight:600;color:var(--text-secondary)}
    .fullscreen-close{
      margin-left:auto;border:none;background:var(--accent-dim);color:var(--accent);
      padding:4px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:.8rem;
      font-family:inherit;font-weight:600;transition:all var(--transition);
    }
    .fullscreen-close:hover{background:var(--accent);color:#000}
    .fullscreen-body{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start}

    /* ---- Mobile ---- */
    @media(max-width:768px){
      #main-content{flex-direction:column}
      #editor-panel{flex:0 0 50%!important;max-width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--border)}
      #divider{width:100%;height:5px;cursor:row-resize}
      #divider::after{width:32px;height:3px}
      #preview-panel{min-width:0}
      .device-group{display:none}
      .size-display{display:none}
      .nav-brand-text{display:none}
      .act-btn[data-tooltip]:hover::after{display:none}
    }

    /* ---- Animations ---- */
    @keyframes subtleGlow{
      0%,100%{box-shadow:0 0 20px rgba(0,230,138,0.05)}
      50%{box-shadow:0 0 30px rgba(0,230,138,0.12)}
    }
    .nav-brand-icon{animation:subtleGlow 3s ease-in-out infinite}

    /* Reduced motion */
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-brackets">&lt;/&gt;</div>
    <div class="loader-name">CodeForge</div>
    <div class="loader-bar"><div class="loader-bar-inner"></div></div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Navbar -->
  <nav id="navbar">
    <a class="nav-brand" href="#" onclick="return false">
      <div class="nav-brand-icon">CF</div>
      <span class="nav-brand-text">CodeForge</span>
    </a>
    <div class="nav-sep"></div>
    <div class="device-group" role="group" aria-label="Device preview modes">
      <button class="device-btn active" data-device="desktop" onclick="setDevice('desktop')">
        <i class="bi bi-display"></i> Desktop
      </button>
      <button class="device-btn" data-device="tablet" onclick="setDevice('tablet')">
        <i class="bi bi-tablet"></i> Tablet
      </button>
      <button class="device-btn" data-device="mobile" onclick="setDevice('mobile')">
        <i class="bi bi-phone"></i> Mobile
      </button>
    </div>
    <span class="size-display" id="sizeDisplay">100%</span>
    <div class="nav-actions">
      <button class="act-btn run-btn" onclick="runCode()" data-tooltip="Run (Ctrl+S)">
        <i class="bi bi-play-fill"></i> Run
      </button>
      <div class="nav-sep"></div>
      <button class="act-btn" onclick="resetCode()" data-tooltip="Reset (Ctrl+R)">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
      <button class="act-btn" onclick="copyCode()" data-tooltip="Copy Code">
        <i class="bi bi-clipboard"></i>
      </button>
      <button class="act-btn" onclick="downloadCode()" data-tooltip="Download HTML">
        <i class="bi bi-download"></i>
      </button>
      <button class="act-btn" onclick="toggleFullscreen()" data-tooltip="Fullscreen Preview">
        <i class="bi bi-arrows-fullscreen"></i>
      </button>
      <button class="act-btn" onclick="clearAll()" data-tooltip="Clear All">
        <i class="bi bi-trash3"></i>
      </button>
      <div class="nav-sep"></div>
      <button class="act-btn" onclick="toggleTheme()" data-tooltip="Toggle Theme" aria-label="Toggle dark/light mode">
        <i class="bi bi-sun-fill theme-toggle-icon"></i>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="main-content">
    <!-- Editor Panel -->
    <div id="editor-panel">
      <div class="editor-tabs" role="tablist">
        <button class="editor-tab active" data-tab="html" onclick="switchTab('html')" role="tab" aria-selected="true">
          <span class="tab-dot html-dot"></span>
          <i class="bi bi-filetype-html"></i> HTML
        </button>
        <button class="editor-tab" data-tab="css" onclick="switchTab('css')" role="tab" aria-selected="false">
          <span class="tab-dot css-dot"></span>
          <i class="bi bi-filetype-css"></i> CSS
        </button>
      </div>
      <div class="editor-wrap active" id="html-wrap">
        <div class="monaco-placeholder">Loading editor...</div>
      </div>
      <div class="editor-wrap" id="css-wrap">
        <div class="monaco-placeholder">Loading editor...</div>
      </div>
    </div>

    <!-- Resizable Divider -->
    <div id="divider" role="separator" aria-orientation="vertical" tabindex="0"></div>

    <!-- Preview Panel -->
    <div id="preview-panel">
      <div class="preview-header">
        <span class="preview-header-dot"></span>
        <span class="preview-header-title">Live Preview</span>
      </div>
      <div class="preview-body" id="previewBody">
        <div class="device-frame desktop" id="deviceFrame">
          <iframe id="preview-iframe" sandbox="allow-scripts" title="Live Preview"></iframe>
        </div>
      </div>
    </div>
  </main>

  <!-- Status Bar -->
  <footer id="status-bar">
    <div class="status-item"><span class="status-dot"></span> Ready</div>
    <div class="status-item" id="statusLang">HTML</div>
    <div class="status-right">
      <div class="status-item" id="statusSave">Auto-saved</div>
      <div class="status-item">
        <span class="status-shortcut">Ctrl+S</span> Run
        <span class="status-shortcut" style="margin-left:6px">Ctrl+R</span> Reset
      </div>
    </div>
  </footer>

  <!-- Fullscreen Overlay -->
  <div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fullscreen-bar">
      <i class="bi bi-arrows-fullscreen" style="color:var(--accent)"></i>
      <span>Fullscreen Preview</span>
      <button class="fullscreen-close" onclick="toggleFullscreen()">Exit Fullscreen</button>
    </div>
    <div class="fullscreen-body">
      <iframe id="fullscreen-iframe" sandbox="allow-scripts" title="Fullscreen Preview" style="width:100%;height:100%;border:none;background:#fff"></iframe>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Monaco Editor Loader -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <script>
    /* =============================
       State & Configuration
    ============================= */
    let htmlEditor = null, cssEditor = null;
    let currentTab = 'html';
    let currentDevice = 'desktop';
    let isDark = true;
    let isFullscreen = false;
    let previewTimer = null;
    let saveTimer = null;

    const DEFAULT_HTML = `<div class="container">

    <button class="btn-primary" onclick="this.textContent='Let\\'s Go!'">
      Get Started
    </button>
  </div>
</div>`;

    const STORAGE_KEY = 'codeforge_data';

    /* =============================
       Toast System
    ============================= */
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const icons = {
        success: 'bi-check-circle-fill',
        error: 'bi-x-circle-fill',
        info: 'bi-info-circle-fill',
        warning: 'bi-exclamation-triangle-fill'
      };
      const toast = document.createElement('div');
      toast.className = `toast-msg ${type}`;
      toast.innerHTML = `<i class="bi ${icons[type] || icons.info} toast-icon"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('removing');
        setTimeout(() => toast.remove(), 300);
      }, 2800);
    }

    /* =============================
       Monaco Editor Setup
    ============================= */
    window.MonacoEnvironment = {
      getWorkerUrl: function(workerId, label) {
        return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
          self.MonacoEnvironment = { baseUrl: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/' };
          importScripts('https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/base/worker/workerMain.js');
        `)}`;
      }
    };

    require.config({
      paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }
    });

    require(['vs/editor/editor.main'], function() {
      // Define a custom dark theme matching the app
      monaco.editor.defineTheme('codeforge-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '555568', fontStyle: 'italic' },
          { token: 'keyword', foreground: '00e68a' },
          { token: 'string', foreground: 'a3e635' },
          { token: 'number', foreground: 'f59e0b' },
          { token: 'tag', foreground: '00e68a' },
          { token: 'attribute.name', foreground: '38bdf8' },
          { token: 'attribute.value', foreground: 'a3e635' },
        ],
        colors: {
          'editor.background': '#0e0e14',
          'editor.foreground': '#e4e4ec',
          'editor.lineHighlightBackground': '#16161e',
          'editor.selectionBackground': '#00e68a33',
          'editorCursor.foreground': '#00e68a',
          'editorIndentGuide.background': '#1e1e2a',
          'editorIndentGuide.activeBackground': '#2a2a3a',
          'editor.selectionHighlightBackground': '#00e68a1a',
        }
      });

      monaco.editor.defineTheme('codeforge-light', {
        base: 'vs',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '9999a6', fontStyle: 'italic' },
          { token: 'keyword', foreground: '#00b86e' },
          { token: 'string', foreground: '#65a30d' },
          { token: 'number', foreground: '#d97706' },
          { token: 'tag', foreground: '#00b86e' },
          { token: 'attribute.name', foreground: '#0284c7' },
          { token: 'attribute.value', foreground: '#65a30d' },
        ],
        colors: {
          'editor.background': '#ffffff',
          'editor.foreground': '#0a0a0f',
          'editor.lineHighlightBackground': '#f4f4f8',
          'editor.selectionBackground': '#00b86e33',
          'editorCursor.foreground': '#00b86e',
          'editorIndentGuide.background': '#eaeaf0',
          'editor.selectionHighlightBackground': '#00b86e1a',
        }
      });

      createEditors();
    });

    function getEditorOptions() {
      return {
        automaticLayout: true,
        formatOnPaste: true,
        formatOnType: true,
        autoClosingBrackets: 'always',
        autoClosingTags: true,
        smoothScrolling: true,
        cursorSmoothCaretAnimation: 'on',
        minimap: { enabled: false },
        wordWrap: 'on',
        fontSize: 14,
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
        fontLigatures: true,
        lineHeight: 22,
        padding: { top: 16, bottom: 16 },
        scrollBeyondLastLine: false,
        renderWhitespace: 'selection',
        bracketPairColorization: { enabled: true },
        guides: { bracketPairs: true, indentation: true },
        tabSize: 2,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        cursorWidth: 2,
        renderLineHighlight: 'all',
        contextmenu: true,
        quickSuggestions: true,
        suggest: {
          showMethods: true,
          showFunctions: true,
          showConstants: true,
          showProperties: true,
          showEvents: true,
          showOperators: true,
          showUnits: true,
          showValues: true,
          showColors: true,
          showFiles: true,
          showReferences: true,
          showWords: true,
        },
        theme: isDark ? 'codeforge-dark' : 'codeforge-light',
      };
    }

    function createEditors() {
      const saved = loadFromStorage();
      const htmlValue = saved ? saved.html : DEFAULT_HTML;
      const cssValue = saved ? saved.css : DEFAULT_CSS;

      htmlEditor = monaco.editor.create(document.getElementById('html-wrap'), {
        ...getEditorOptions(),
        value: htmlValue,
        language: 'html',
      });

      cssEditor = monaco.editor.create(document.getElementById('css-wrap'), {
        ...getEditorOptions(),
        value: cssValue,
        language: 'css',
      });

      // Remove placeholder text
      document.querySelectorAll('.monaco-placeholder').forEach(el => el.remove());

      // Listen for changes
      htmlEditor.onDidChangeModelContent(() => {
        schedulePreviewUpdate();
        scheduleAutoSave();
      });
      cssEditor.onDidChangeModelContent(() => {
        schedulePreviewUpdate();
        scheduleAutoSave();
      });

      // Initial preview
      updatePreview();
      updateSizeDisplay();

      // Hide loading screen
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        showToast('Editor ready. Happy coding!', 'success');
      }, 600);
    }

    /* =============================
       Tab Switching
    ============================= */
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.editor-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
        t.setAttribute('aria-selected', t.dataset.tab === tab);
      });
      document.querySelectorAll('.editor-wrap').forEach(w => w.classList.remove('active'));
      document.getElementById(`${tab}-wrap`).classList.add('active');

      // Update status bar language indicator
      document.getElementById('statusLang').textContent = tab.toUpperCase();

      // Force Monaco to recalculate layout
      const editor = tab === 'html' ? htmlEditor : cssEditor;
      if (editor) {
        setTimeout(() => editor.layout(), 10);
      }
    }

    /* =============================
       Live Preview
    ============================= */
    function schedulePreviewUpdate() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(updatePreview, 350);
    }

    function updatePreview() {
      if (!htmlEditor || !cssEditor) return;
      const html = htmlEditor.getValue();
      const css = cssEditor.getValue();
      const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>${css}</style></head><body>${html}</body></html>`;
      const iframe = document.getElementById('preview-iframe');
      iframe.srcdoc = doc;

      // Also update fullscreen iframe if active
      if (isFullscreen) {
        document.getElementById('fullscreen-iframe').srcdoc = doc;
      }
    }

    /* =============================
       Device Mode
    ============================= */
    function setDevice(mode) {
      currentDevice = mode;
      document.querySelectorAll('.device-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.device === mode);
      });
      const frame = document.getElementById('deviceFrame');
      frame.className = 'device-frame ' + mode;

      // Adjust iframe height for device frames
      if (mode === 'desktop') {
        frame.style.height = '100%';
      } else {
        frame.style.height = '';
      }

      updateSizeDisplay();
    }

    function updateSizeDisplay() {
      const frame = document.getElementById('deviceFrame');
      // Wait for transition to finish for accurate measurement
      setTimeout(() => {
        const w = frame.offsetWidth;
        const h = frame.offsetHeight;
        document.getElementById('sizeDisplay').textContent = `${w} × ${h}`;
      }, 500);
    }

    /* =============================
       Action Handlers
    ============================= */
    function runCode() {
      updatePreview();
      showToast('Code executed successfully', 'success');
      document.getElementById('statusSave').textContent = 'Executed';
      setTimeout(() => {
        document.getElementById('statusSave').textContent = 'Auto-saved';
      }, 2000);
    }

    function resetCode() {
      htmlEditor.setValue(DEFAULT_HTML);
      cssEditor.setValue(DEFAULT_CSS);
      updatePreview();
      saveToStorage();
      showToast('Code reset to defaults', 'info');
    }

    function copyCode() {
      const html = htmlEditor.getValue();
      const css = cssEditor.getValue();
      const full = `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>CodeForge Export</title>\n  <style>\n${css}\n  </style>\n</head>\n<body>\n${html}\n</body>\n</html>`;
      navigator.clipboard.writeText(full).then(() => {
        showToast('Code copied to clipboard', 'success');
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = full; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Code copied to clipboard', 'success');
      });
    }

    function downloadCode() {
      const html = htmlEditor.getValue();
      const css = cssEditor.getValue();
      const full = `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>CodeForge Export</title>\n  <style>\n${css}\n  </style>\n</head>\n<body>\n${html}\n</body>\n</html>`;
      const blob = new Blob([full], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'codeforge-export.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('HTML file downloaded', 'success');
    }

    function clearAll() {
      htmlEditor.setValue('');
      cssEditor.setValue('');
      updatePreview();
      showToast('All code cleared', 'warning');
    }

    function toggleFullscreen() {
      isFullscreen = !isFullscreen;
      const overlay = document.getElementById('fullscreenOverlay');
      if (isFullscreen) {
        overlay.classList.add('active');
        const html = htmlEditor.getValue();
        const css = cssEditor.getValue();
        const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>${css}</style></head><body>${html}</body></html>`;
        document.getElementById('fullscreen-iframe').srcdoc = doc;
      } else {
        overlay.classList.remove('active');
        document.getElementById('fullscreen-iframe').srcdoc = '';
      }
    }

    /* =============================
       Theme Toggle
    ============================= */
    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');

      // Update Monaco theme
      const themeName = isDark ? 'codeforge-dark' : 'codeforge-light';
      monaco.editor.setTheme(themeName);

      // Update icon
      const icon = document.querySelector('.theme-toggle-icon');
      icon.className = isDark ? 'bi bi-sun-fill theme-toggle-icon' : 'bi bi-moon-fill theme-toggle-icon';

      showToast(`Switched to ${isDark ? 'dark' : 'light'} mode`, 'info');
    }

    /* =============================
       Auto-Save
    ============================= */
    function scheduleAutoSave() {
      clearTimeout(saveTimer);
      document.getElementById('statusSave').textContent = 'Saving...';
      saveTimer = setTimeout(() => {
        saveToStorage();
        document.getElementById('statusSave').textContent = 'Auto-saved';
      }, 800);
    }

    function saveToStorage() {
      try {
        const data = {
          html: htmlEditor.getValue(),
          css: cssEditor.getValue(),
          theme: isDark ? 'dark' : 'light',
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch(e) { /* storage full or unavailable */ }
    }

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        // Restore theme preference
        if (data.theme === 'light') {
          isDark = false;
          document.documentElement.setAttribute('data-theme', 'light');
          document.querySelector('.theme-toggle-icon').className = 'bi bi-moon-fill theme-toggle-icon';
        }
        return data;
      } catch(e) { return null; }
    }

    /* =============================
       Resizable Panels
    ============================= */
    function initResizable() {
      const divider = document.getElementById('divider');
      const editorPanel = document.getElementById('editor-panel');
      const mainContent = document.getElementById('main-content');
      let isDragging = false;
      let startPos = 0;
      let startWidth = 0;

      function onStart(e) {
        isDragging = true;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        startPos = clientX;
        startWidth = editorPanel.offsetWidth;
        e.preventDefault();
      }

      function onMove(e) {
        if (!isDragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const dx = clientX - startPos;
        const containerW = mainContent.offsetWidth;
        let newWidth = startWidth + dx;
        const minW = 260;
        const maxW = containerW - 260;
        newWidth = Math.max(minW, Math.min(maxW, newWidth));
        const pct = (newWidth / containerW) * 100;
        editorPanel.style.flexBasis = pct + '%';
        // Re-layout both editors
        if (htmlEditor) htmlEditor.layout();
        if (cssEditor) cssEditor.layout();
        updateSizeDisplay();
      }

      function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }

      divider.addEventListener('mousedown', onStart);
      divider.addEventListener('touchstart', onStart, { passive: false });
      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);

      // Keyboard resize with arrow keys when divider is focused
      divider.addEventListener('keydown', (e) => {
        const step = 20;
        const containerW = mainContent.offsetWidth;
        const currentW = editorPanel.offsetWidth;
        let newWidth = currentW;
        if (e.key === 'ArrowLeft') newWidth = currentW - step;
        else if (e.key === 'ArrowRight') newWidth = currentW + step;
        else return;
        e.preventDefault();
        const minW = 260, maxW = containerW - 260;
        newWidth = Math.max(minW, Math.min(maxW, newWidth));
        editorPanel.style.flexBasis = ((newWidth / containerW) * 100) + '%';
        if (htmlEditor) htmlEditor.layout();
        if (cssEditor) cssEditor.layout();
        updateSizeDisplay();
      });
    }

    /* =============================
       Keyboard Shortcuts
    ============================= */
    function initShortcuts() {
      document.addEventListener('keydown', (e) => {
        // Ctrl+S = Run
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          runCode();
        }
        // Ctrl+R = Reset
        if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
          e.preventDefault();
          resetCode();
        }
        // Escape = Exit fullscreen
        if (e.key === 'Escape' && isFullscreen) {
          toggleFullscreen();
        }
      });
    }

    /* =============================
       Window Resize Handler
    ============================= */
    function initResizeHandler() {
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          if (htmlEditor) htmlEditor.layout();
          if (cssEditor) cssEditor.layout();
          updateSizeDisplay();
        }, 100);
      });
    }

    /* =============================
       Initialize Everything
    ============================= */
    document.addEventListener('DOMContentLoaded', () => {
      initResizable();
      initShortcuts();
      initResizeHandler();

      // Observe preview body for device frame size changes
      const previewBody = document.getElementById('previewBody');
      const resizeObs = new ResizeObserver(() => {
        updateSizeDisplay();
      });
      resizeObs.observe(previewBody);
    });
  </script>
</body>
