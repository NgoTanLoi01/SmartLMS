name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_NO_AUDIT: 1

jobs:
  php-tests:
    name: PHPUnit (PHP 8.4)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, curl, dom, fileinfo, gd, mbstring, pdo_sqlite, sqlite3, zip
          coverage: none
          tools: composer:v2
        env:
          fail-fast: true

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Discover Laravel packages
        run: php artisan package:discover --ansi

      - name: Run test suite
        run: php artisan test --ansi

  pint:
    name: Laravel Pint
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Check PHP formatting
        run: vendor/bin/pint --test

  frontend-build:
    name: Frontend build (Node 24)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build
