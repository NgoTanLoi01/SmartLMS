version: "3.8"

services:
    nginx:
        image: nginx:stable-alpine
        container_name: lms-nginx
        ports:
            - "8000:80" # Đây là cổng duy nhất học sinh truy cập vào
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: lms-app
        volumes:
            - ./:/var/www/html
        # XÓA HOẶC COMMENT ĐOẠN PORTS DƯỚI ĐÂY
        # ports:
        #     - "8080:8080" 
        environment:
            - DB_CONNECTION=mysql
            - DB_HOST=db
            - DB_PORT=3306
            - DB_DATABASE=lms_db
            - DB_USERNAME=lms_user
            - DB_PASSWORD=lms_password
            # Cấu hình cho Vector DB (PostgreSQL)
            - DB_VECTOR_CONNECTION=pgsql
            - DB_VECTOR_HOST=postgres_vector
            - DB_VECTOR_PORT=5432
            - DB_VECTOR_DATABASE=lms_ai
            - DB_VECTOR_USERNAME=ai_user
            - DB_VECTOR_PASSWORD=ai_password
        ports:
            - "8080:8080"

    db:
        image: mysql:8.0
        container_name: lms-db
        restart: always
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: lms_db
            MYSQL_USER: lms_user
            MYSQL_PASSWORD: lms_password
            MYSQL_ROOT_PASSWORD: root_password
        volumes:
            - db_data:/var/lib/mysql

    postgres_vector:
        image: ankane/pgvector:latest
        container_name: lms-vector-db
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: lms_ai
            POSTGRES_USER: ai_user
            POSTGRES_PASSWORD: ai_password
        volumes:
            - pg_data:/var/lib/postgresql/data

volumes:
    db_data:
    pg_data: