services:

    nginx:
        image: nginx:stable-alpine

        container_name: lms-nginx

        ports:
            - "8000:80"

        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

        depends_on:
            - app
            - reverb

        restart: unless-stopped

        deploy:
            resources:
                limits:
                    memory: 128M
                reservations:
                    memory: 64M

    app:
        build:
            context: .
            dockerfile: Dockerfile

        container_name: lms-app

        working_dir: /var/www/html

        volumes:
            - ./:/var/www/html

        environment:

            APP_NAME: SmartLMS
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: https://smartlms.io.vn

            # ✅ Thêm APP_KEY (bắt buộc cho session/encryption)
            APP_KEY: base64:+CK2fS1IJxYjGH2DTaKGj1y1a+ZubTxekFxvWdHCPF0=

            CACHE_DRIVER: file
            SESSION_DRIVER: file
            QUEUE_CONNECTION: sync

            BROADCAST_CONNECTION: reverb

            REVERB_APP_ID: 123456
            REVERB_APP_KEY: smartlms_key_123
            REVERB_APP_SECRET: smartlms_secret_123

            # ✅ Trỏ đúng tên container lms-reverb
            REVERB_HOST: lms-reverb
            REVERB_PORT: 8080
            REVERB_SCHEME: http

            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: lms_db
            DB_USERNAME: lms_user
            DB_PASSWORD: lms_password

            DB_VECTOR_CONNECTION: pgsql
            DB_VECTOR_HOST: postgres_vector
            DB_VECTOR_PORT: 5432
            DB_VECTOR_DATABASE: lms_ai
            DB_VECTOR_USERNAME: ai_user
            DB_VECTOR_PASSWORD: ai_password

        depends_on:
            db:
                condition: service_healthy
            postgres_vector:
                condition: service_started

        restart: unless-stopped

        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M

    reverb:
        build:
            context: .
            dockerfile: Dockerfile

        container_name: lms-reverb

        working_dir: /var/www/html

        volumes:
            - ./:/var/www/html

        environment:

            APP_NAME: SmartLMS
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: https://smartlms.io.vn

            APP_KEY: base64:+CK2fS1IJxYjGH2DTaKGj1y1a+ZubTxekFxvWdHCPF0=

            BROADCAST_CONNECTION: reverb

            REVERB_APP_ID: 123456
            REVERB_APP_KEY: smartlms_key_123
            REVERB_APP_SECRET: smartlms_secret_123

            REVERB_HOST: 0.0.0.0
            REVERB_PORT: 8080
            REVERB_SCHEME: http

            CACHE_DRIVER: file
            SESSION_DRIVER: file
            QUEUE_CONNECTION: sync

            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: lms_db
            DB_USERNAME: lms_user
            DB_PASSWORD: lms_password

        command: >
            sh -c "
                php artisan optimize:clear &&
                php artisan config:clear &&
                php artisan cache:clear &&
                php artisan route:clear &&
                php artisan view:clear &&
                php artisan reverb:start --host=0.0.0.0 --port=8080
            "

        depends_on:
            db:
                condition: service_healthy
            app:
                condition: service_started

        ports:
            - "8080:8080"

        restart: unless-stopped

        deploy:
            resources:
                limits:
                    memory: 256M
                reservations:
                    memory: 128M

    db:
        image: mysql:8.0

        container_name: lms-db

        restart: always

        ports:
            - "3306:3306"

        environment:
            MYSQL_DATABASE: lms_db
            MYSQL_USER: lms_user
            MYSQL_PASSWORD: lms_password
            MYSQL_ROOT_PASSWORD: root_password

        volumes:
            - db_data:/var/lib/mysql

        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M

    postgres_vector:
        image: ankane/pgvector:latest

        container_name: lms-vector-db

        restart: always

        ports:
            - "5432:5432"

        environment:
            POSTGRES_DB: lms_ai
            POSTGRES_USER: ai_user
            POSTGRES_PASSWORD: ai_password

            # ✅ Tối ưu PostgreSQL cho dev
            POSTGRES_INITDB_ARGS: "--encoding=UTF8"

        volumes:
            - pg_data:/var/lib/postgresql/data

        # ✅ Giới hạn memory pgvector
        command: >
            postgres
            -c shared_buffers=256MB
            -c work_mem=16MB
            -c maintenance_work_mem=64MB
            -c max_connections=50

        deploy:
            resources:
                limits:
                    memory: 1G
                reservations:
                    memory: 512M

volumes:
    db_data:
    pg_data: