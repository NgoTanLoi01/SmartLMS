version: "3.8"

services:
    # Dịch vụ 1: Nginx
    nginx:
        image: nginx:stable-alpine
        container_name: lms-nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    # Dịch vụ 2: PHP App
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: lms-app
        volumes:
            - ./:/var/www/html
        environment:
            - DB_CONNECTION=mysql
            - DB_HOST=db
            - DB_PORT=3306
            - DB_DATABASE=lms_db
            - DB_USERNAME=lms_user
            - DB_PASSWORD=lms_password

    # Dịch vụ 3: MySQL (Đảm bảo db thụt lề vào trong giống app và nginx)
    db:
        image: mysql:8.0
        container_name: lms-db
        restart: always
        ports:
            - "3306:3306" # Cổng để TablePlus truy cập
        environment:
            MYSQL_DATABASE: lms_db
            MYSQL_USER: lms_user
            MYSQL_PASSWORD: lms_password
            MYSQL_ROOT_PASSWORD: root_password
        volumes:
            - db_data:/var/lib/mysql

# Volume nằm ngoài cùng, ngang hàng với services
volumes:
    db_data: